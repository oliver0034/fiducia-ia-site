name: Déploiement Hostinger

# Déploie le site vers Hostinger par FTP :
# - automatiquement à chaque push/merge sur main
# - manuellement depuis l'onglet Actions (bouton "Run workflow") ou via l'API
#
# Prérequis (une seule fois) — 3 secrets à créer dans
# Settings → Secrets and variables → Actions :
#   FTP_SERVER    : hôte FTP Hostinger (ex. ftp.fiducia-ia.com ou l'IP indiquée dans hPanel)
#   FTP_USERNAME  : utilisateur FTP (créer dans hPanel un compte dont le dossier
#                   racine est le public_html du domaine fiducia-ia.com)
#   FTP_PASSWORD  : mot de passe de ce compte FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploiement-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Envoi des fichiers vers Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement FTP (synchronisation incrémentale)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/README.md
