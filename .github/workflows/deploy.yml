name: Déploiement Hostinger

# Solution de secours manuelle : le déploiement principal passe par
# l'intégration Git native de Hostinger (hPanel → Avancé → GIT, webhook
# automatique sur push main), comme pour gold-strategies-site.
# Ce workflow ne sert que si le déploiement Git Hostinger est indisponible.
# Il se lance depuis l'onglet Actions ("Run workflow") ou via l'API, et
# nécessite 3 secrets dans Settings → Secrets and variables → Actions :
#   FTP_SERVER    : hôte FTP Hostinger (ex. ftp.fiducia-ia.com)
#   FTP_USERNAME  : compte FTP dont la racine est le public_html du domaine
#   FTP_PASSWORD  : mot de passe de ce compte FTP

on:
  workflow_dispatch:

concurrency:
  group: deploiement-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Envoi des fichiers vers Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement FTP (synchronisation incrémentale)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/README.md
